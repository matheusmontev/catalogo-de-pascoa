<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emilly Doces Artesanais - Cardápio</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <!-- Splash Screen Inicial -->
    <div id="splashScreen" class="position-fixed top-0 start-0 w-100 h-100 bg-light d-flex justify-content-center align-items-center" style="z-index: 9999; transition: opacity 0.6s ease, visibility 0.6s ease;">
        <img id="splashLogo" src="emilly-doces/img/WhatsApp Image 2026-03-26 at 00.46.39.jpeg" alt="Carregando..." style="max-width: 200px; animation: pulseLogo 1.5s infinite;">
    </div>

    <!-- Header -->
    <header class="header-theme py-3 text-center mb-4">
        <img id="logoCardapio" src="emilly-doces/img/WhatsApp Image 2026-03-26 at 00.46.39.jpeg" alt="Logo Emilly Doces" class="logo-cardapio mx-auto mb-2">
        <h1 class="h3 fw-bold mb-0">Emilly Doces Artesanais</h1>
    </header>

    <!-- Banner Aviso -->
    <div class="container d-none" id="avisoHeader">
        <div class="alert alert-warning text-center" role="alert" id="textoAviso"></div>
    </div>

    <!-- Banner Loja Fechada -->
    <div class="container text-center py-4 d-none" id="lojaFechadaMsg">
        <div class="p-5 rounded-4 shadow-sm" style="background-color: var(--pink-light); border: 2px solid var(--pink-main);">
            <i class="bi bi-door-closed text-pink mb-2" style="font-size: 3rem;"></i>
            <h2 class="fw-bold text-pink mt-3">🔴 Estamos fechados no momento.</h2>
            <p class="fs-5 text-muted mt-2">Em breve voltamos com novidades! 🍬</p>
        </div>
    </div>

    <!-- Spinner Loading -->
    <div class="container text-center py-5" id="loader">
        <div class="spinner-border text-pink" role="status"></div>
        <p class="mt-2 text-muted">Carregando cardápio...</p>
    </div>

    <div class="container" id="menuContainer" style="display: none;">
        <!-- Categorias (Tabs) -->
        <ul class="nav nav-pills mb-4 gap-2 flex-nowrap overflow-auto hide-scroll" id="categoriasTab" role="tablist">
            <!-- Gerado via JS -->
        </ul>

        <!-- Lista de Produtos -->
        <div class="mb-5 pb-5" id="produtosGrid">
            <!-- Gerado via JS -->
        </div>
    </div>

    <!-- Botão Fixo Carrinho -->
    <div class="fab-cart" onclick="abrirCarrinho()" id="fabCart">
        <i class="bi bi-cart3"></i>
        <span class="badge bg-danger rounded-pill cart-badge" id="cartCount">0</span>
    </div>

    <!-- Modal Adicionar Quantidade -->
    <div class="modal fade" id="modalAdicionar" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold" id="modalAddNome">Nome do Produto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center">
                    <p class="text-muted mb-4" id="modalAddDesc"></p>
                    <h4 class="text-pink fw-bold mb-4" id="modalAddPreco">R$ 0,00</h4>
                    
                    <div class="d-flex justify-content-center align-items-center gap-3 mb-3">
                        <button class="btn btn-outline-pink rounded-circle" onclick="alterarQtd(-1)"><i class="bi bi-dash"></i></button>
                        <span class="fs-4 fw-bold" id="qtdItem">1</span>
                        <button class="btn btn-outline-pink rounded-circle" onclick="alterarQtd(1)"><i class="bi bi-plus"></i></button>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-pink w-100 py-2 fw-bold" onclick="confirmarAdicao()">Adicionar <span id="modalAddSubtotal"></span></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Offcanvas Carrinho -->
    <div class="offcanvas offcanvas-bottom h-auto rounded-top-4 shadow-lg" tabindex="-1" id="offcanvasCarrinho" aria-labelledby="offcanvasCarrinhoLabel">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title fw-bold" id="offcanvasCarrinhoLabel"><i class="bi bi-cart3 me-2"></i>Seu Pedido</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <div id="carrinhoVazio" class="text-center py-4 text-muted">
                <i class="bi bi-bag-x fs-1 mb-2"></i>
                <p>Seu carrinho está vazio.</p>
            </div>
            <div id="carrinhoItens" class="mb-3">
                <!-- Itens via JS -->
            </div>
            <div class="justify-content-between align-items-center fw-bold fs-5 mb-3 d-none" id="totalCarrinhoContainer">
                <span>Total:</span>
                <span class="text-pink" id="totalCarrinho">R$ 0,00</span>
            </div>
            <button class="btn btn-pink w-100 py-3 fw-bold d-none" id="btnEnviarPedido" onclick="enviarPedido()">Enviar Pedido</button>
        </div>
    </div>

    <!-- Modal Finalizar Pedido -->
    <div class="modal fade" id="modalFinalizar" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Finalizar Pedido</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="formFinalizar">
                        <div class="mb-3">
                            <label for="clienteNome" class="form-label fw-bold">Seu Nome</label>
                            <input type="text" class="form-control" id="clienteNome" placeholder="Ex: Maria Silva" required>
                            <div class="invalid-feedback d-none" id="erroNomeCliente"></div>
                        </div>
                        <div class="mb-4">
                            <label for="clienteWhatsApp" class="form-label fw-bold">Seu WhatsApp</label>
                            <input type="tel" class="form-control" id="clienteWhatsApp" placeholder="(00) 00000-0000" maxlength="15" required>
                            <div class="invalid-feedback d-none" id="erroWhatsCliente"></div>
                        </div>
                        <h6 class="fw-bold mb-2">Resumo:</h6>
                        <div id="resumoPedidoModal" class="small mb-3 text-muted"></div>
                        <div class="d-flex justify-content-between fw-bold fs-5 text-pink border-top pt-2">
                            <span>Total Estimado:</span>
                            <span id="totalFinalizarModal">R$ 0,00</span>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-pink w-100 py-3 fw-bold" onclick="confirmarEnvioPedido()" id="btnConfirmarPedido">
                        Confirmar Pedido
                    </button>
                    <div id="loadingFinalizar" class="text-center w-100 d-none">
                        <div class="spinner-border text-pink spinner-border-sm" role="status"></div> Enviando...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Sucesso -->
    <div class="toast-container position-fixed top-0 mt-3 end-0 p-3" style="z-index: 1055">
        <div id="toastSucesso" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body fw-bold" id="toastMsg">
                    Pedido enviado com sucesso!
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS + Aplicação -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/cardapio.js"></script>
    <script type="module" src="js/carrinho.js"></script>
</body>
</html>
